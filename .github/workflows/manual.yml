name: manual working

on:
  push:
    branch: [master]
    

  workflow_dispatch:
    inputs:
      name:
        description: 'name for the yml'
        required: true
        type: string
      greeting:
        description: 'type the greeting'
        required: true
        type: string
      data:
        description: 'Base64 encoded content of a file'
        required: false
        type: string




jobs:
