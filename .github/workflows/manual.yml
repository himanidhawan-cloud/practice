    runs-on: ubuntu-latest
    steps:
      - name: helloing
        run: echo "hi , ${{inputs.name}}"
      - name: greeting
        run: echo "${{inputs.greetig}} , ${{inputs.name}}, ${{inputs.data}}, trying to run this code with manual approach help meeeeeee"
      - name: Display File Content
        run: |
          echo "Contents of the file:"
          cat ./decoded_file.txt

    