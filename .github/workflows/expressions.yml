name: expressions of my life
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  expression:
    runs-on: ubuntu-latest
    steps:
      - name: 1st stage 
        run: echo "${{github.actor}}"
      - name: 2nd stage
        run: echo "${{github.repository}}"
      - name: Print Branch
        run: echo "${{ github.ref }}"
      - name: Print Event
        run: echo "${{ github.event_name }}"
      - name: Print Runner
        run: echo "${{ runner.os }}"