name: expressions of my life
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  runs-on: ubuntu-latest
  expression:
    step:
      - name: 1st stage 
        run: echo "{{github.actor}}"
      - name: 2nd stage
        run: echo {{github.repository}}
      - name: Print Branch
        run: echo "Branch = ${{ github.ref }}"
      - name: Print Event
        run: echo "Event = ${{ github.event_name }}"
      - name: Print Runner
        run: echo "OS = ${{ runner.os }}"